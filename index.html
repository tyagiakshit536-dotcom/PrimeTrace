<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreadBoard | Investigation Workspace</title>

    <style>
      :root {
        --grid-color: rgba(255, 255, 255, 0.03);
        --ghost-charcoal: #3b4653;
        --ghost-charcoal-rgb: 59, 70, 83;
        --bg-grad-1: #09090b;
        --bg-grad-2: #15171a;
        --accent-glow: rgba(var(--ghost-charcoal-rgb), 0.2);
        --accent-glow-soft: rgba(var(--ghost-charcoal-rgb), 0.12);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-grad-1);
        background-image: 
          radial-gradient(circle at 15% 50%, var(--accent-glow), transparent 25%),
          radial-gradient(circle at 85% 30%, var(--accent-glow-soft), transparent 25%),
          linear-gradient(to bottom right, var(--bg-grad-1), var(--bg-grad-2));
        color: #f8fafc;
        font-family: "Segoe UI", "Inter", system-ui, sans-serif;
        overflow: hidden;
      }
      
      /* Billion-dollar grid background 💫 */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-size: 40px 40px;
        background-image: 
          linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
        mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        pointer-events: none;
        z-index: -1;
      }
      
      /* Subtle ambient sweeping animation */
      @keyframes floatGlow {
        0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
        50% { transform: translate(100px, 50px) scale(1.1); opacity: 0.8; }
        100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      }
      
      .ambient-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(var(--ghost-charcoal-rgb), 0.16) 0%, rgba(0, 0, 0, 0) 70%);
        border-radius: 50%;
        top: -200px;
        left: -200px;
        pointer-events: none;
        z-index: -1;
        animation: floatGlow 20s infinite ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="ambient-glow"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
